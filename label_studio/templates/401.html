{% extends 'simple.html' %}
{% load static %}

{% block head %}
  <title>401 | Label Studio</title>
  <link rel="stylesheet" href="{{ settings.HOSTNAME }}{% static 'css/error.css' %}"/>
{% endblock %}


{% block content %}
<div class="ls-global-error">
  <h1>身份认证错误</h1>
  <img class="ls-global-error__heidi" src="{{ settings.HOSTNAME }}{% static 'images/opossum_broken.svg' %}" height="111" alt="Heidi's down" />
  <h2>401 未提供身份验证凭据</h2>
  {% autoescape off %}
  <div class="ls-global-error__details">{{ exception }}</div>
  {% endautoescape %}
  <p class="ls-global-error__actions">
    <!-- <a class="ls-global-error__slack button" target="_blank" href="https://slack.labelstudio.heartex.com/?source=product-401-error">
      <img src="{{ settings.HOSTNAME }}{% static 'images/slack.png' %}" width="16" />
      Ask on Slack
    </a> -->
    <button onClick="history.back()">返回</button>
    <button onClick="location.reload()">刷新</button>
  </p>
</div>
{% endblock %}
